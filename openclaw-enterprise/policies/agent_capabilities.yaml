policy_version: 2

global_defaults:
  denied_tools:
    - browse_web
    - fetch_url
    - open_browser
    - web_search
    - http_request_external
  denied_tool_groups:
    - web
    - browser
  notes: >
    Restricción global por defecto aplicada a todos los agentes.
    Previene exfiltración de datos vía prompt injection a URLs externas.
    Iniciativa 5.6 del documento de seguridad.

agents:
  chief_of_staff:
    model: claude-opus-4.6
    allowed_tools:
      - route_task
      - decompose_task
      - consolidate_report
      - request_hitl_approval
      - enforce_policy_gate
    denied_tools:
      - write_production_db
      - merge_pull_request
      - deploy
    requires_human_approval_for:
      - merge_pull_request
      - deploy
      - write_financial_baseline
      - run_n8n_production_workflow

  financial_analyst:
    model: claude-opus-4.6
    allowed_tools:
      - read_financial_documents
      - compute_financial_kpis
      - build_financial_narrative
    denied_tools:
      - push_code
      - merge_pull_request
      - change_security_policy

  financial_parser:
    model: kimi-2.5
    allowed_tools:
      - parse_pdf
      - normalize_financial_dataset
      - write_mem_finance_staging
    denied_tools:
      - write_mem_tech
      - merge_pull_request

  developer:
    model: gpt-4o
    allowed_tools:
      - edit_code
      - run_unit_tests
      - open_pull_request
    denied_tools:
      - approve_own_pr
      - deploy
      - write_mem_finance

  backend_agent:
    model: gpt-4o
    allowed_tools:
      - design_api_contract
      - implement_backend_service
      - run_backend_tests
      - profile_backend_performance
    denied_tools:
      - edit_frontend_ui
      - approve_own_pr
      - write_mem_finance

  frontend_agent:
    model: claude-sonnet-4.5
    allowed_tools:
      - implement_ui_components
      - run_frontend_tests
      - run_accessibility_checks
      - optimize_bundle_size
    denied_tools:
      - change_database_schema
      - approve_own_pr
      - deploy

  database_agent:
    model: gpt-4o
    allowed_tools:
      - design_schema
      - create_migration
      - run_query_plan_analysis
      - tune_indexes
      - backup_restore_validation
    denied_tools:
      - expose_production_secrets
      - approve_own_pr
      - edit_frontend_ui

  n8n_automation_agent:
    model: gpt-4o
    allowed_tools:
      - create_n8n_workflow
      - update_n8n_workflow
      - validate_n8n_workflow
      - execute_n8n_workflow_staging
    denied_tools:
      - execute_n8n_workflow_production_without_hitl
      - manage_root_credentials
      - disable_audit_logging
    requires_human_approval_for:
      - execute_n8n_workflow_production
      - modify_financial_automation_rules

  code_reviewer:
    model: claude-sonnet-4.5
    allowed_tools:
      - review_diff
      - run_static_analysis
      - request_changes
      - validate_architecture_constraints
    denied_tools:
      - merge_pull_request

  security_agent:
    model: claude-sonnet-4.5
    allowed_tools:
      - run_owasp_checks
      - dependency_scan
      - secret_scan
      - check_authz_authn
      - approve_security_gate
    denied_tools:
      - edit_business_logic
      - merge_pull_request

routing:
  frontend_tasks:
    - frontend_agent
    - code_reviewer
    - security_agent
  backend_tasks:
    - backend_agent
    - code_reviewer
    - security_agent
  database_tasks:
    - database_agent
    - code_reviewer
    - security_agent
  n8n_automation_tasks:
    - n8n_automation_agent
    - code_reviewer
    - security_agent

limits:
  max_retries_per_state: 2
  max_parallel_agents: 6
