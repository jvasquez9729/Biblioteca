name: openclaw-enterprise-ci

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint-test-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f scripts/requirements-runtime.txt ]; then pip install -r scripts/requirements-runtime.txt; fi
          pip install ruff bandit pip-audit

      - name: Lint (ruff)
        run: ruff check scripts

      - name: Syntax check
        run: python -m compileall -q scripts

      - name: SAST (bandit)
        run: bandit -q -r scripts

      - name: Dependency scan (pip-audit)
        run: pip-audit

      - name: Secret scan (basic)
        run: |
          if grep -R -n -E "(AKIA[0-9A-Z]{16}|OPENAI_API_KEY=|ANTHROPIC_API_KEY=|TELEGRAM_TOKEN=.{15,})" . ; then
            echo "Potential secrets detected"
            exit 1
          fi

