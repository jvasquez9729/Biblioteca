version: '3.9'

# IMPORTANTE: Crear .env en la raiz del proyecto con las variables requeridas.
# Ver .env.example para la plantilla.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: openclaw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}       # C1: desde .env, nunca en texto plano
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}   # C1: desde .env, nunca en texto plano
      POSTGRES_DB:       ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"   # C3: solo loopback, no expuesto a red externa
    volumes:
      - pgdata:/var/lib/postgresql/data
    # C4: Docker hardening — filesystem de solo lectura con tmpfs para escrituras necesarias
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
      - /var/run/postgresql:rw,noexec,nosuid,size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_READ_SEARCH
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
